{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} WorkOrder | NexusFSM{% endblock %}
{% block page_title %}{% if editing %}Edit WorkOrder{% else %}New WorkOrder{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Customer Name</label>
        <input type="text" name="customer_name" value="{{ record.customer_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Priority</label>
        <select name="priority">
          <option value="low" {% if record.priority == 'low' %}selected{% endif %}>Low</option>
          <option value="medium" {% if record.priority == 'medium' %}selected{% endif %}>Medium</option>
          <option value="high" {% if record.priority == 'high' %}selected{% endif %}>High</option>
          <option value="emergency" {% if record.priority == 'emergency' %}selected{% endif %}>Emergency</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="new" {% if record.status == 'new' %}selected{% endif %}>New</option>
          <option value="assigned" {% if record.status == 'assigned' %}selected{% endif %}>Assigned</option>
          <option value="in_progress" {% if record.status == 'in_progress' %}selected{% endif %}>In Progress</option>
          <option value="completed" {% if record.status == 'completed' %}selected{% endif %}>Completed</option>
          <option value="cancelled" {% if record.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Technician</label>
        <input type="text" name="technician" value="{{ record.technician|default:'' }}">
      </div>
      <div class="form-group">
        <label>Scheduled Date</label>
        <input type="date" name="scheduled_date" value="{{ record.scheduled_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} WorkOrder</button>
      <a href="/workorders/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
