{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Technician | NexusFSM{% endblock %}
{% block page_title %}{% if editing %}Edit Technician{% else %}New Technician{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ record.phone|default:'' }}">
      </div>
      <div class="form-group">
        <label>Specialization</label>
        <input type="text" name="specialization" value="{{ record.specialization|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="available" {% if record.status == 'available' %}selected{% endif %}>Available</option>
          <option value="on_job" {% if record.status == 'on_job' %}selected{% endif %}>On Job</option>
          <option value="off_duty" {% if record.status == 'off_duty' %}selected{% endif %}>Off Duty</option>
        </select>
      </div>
      <div class="form-group">
        <label>Jobs Completed</label>
        <input type="number" name="jobs_completed" value="{{ record.jobs_completed|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Rating</label>
        <input type="number" step="0.01" name="rating" value="{{ record.rating|default:'0' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Technician</button>
      <a href="/technicians/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
