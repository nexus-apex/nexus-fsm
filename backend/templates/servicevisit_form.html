{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} ServiceVisit | NexusFSM{% endblock %}
{% block page_title %}{% if editing %}Edit ServiceVisit{% else %}New ServiceVisit{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Work Order</label>
        <input type="text" name="work_order" value="{{ record.work_order|default:'' }}">
      </div>
      <div class="form-group">
        <label>Technician Name</label>
        <input type="text" name="technician_name" value="{{ record.technician_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Visit Date</label>
        <input type="date" name="visit_date" value="{{ record.visit_date|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Duration Hours</label>
        <input type="number" step="0.01" name="duration_hours" value="{{ record.duration_hours|default:'0' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Parts Used</label>
      <textarea name="parts_used">{{ record.parts_used|default:'' }}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="completed" {% if record.status == 'completed' %}selected{% endif %}>Completed</option>
          <option value="follow_up_needed" {% if record.status == 'follow_up_needed' %}selected{% endif %}>Follow Up Needed</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea name="notes">{{ record.notes|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} ServiceVisit</button>
      <a href="/servicevisits/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
